# Example caller workflow.
# Copy this into a PLUGIN repo at .github/workflows/deploy.yml.
name: Build & Deploy Plugin

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Deploy to Minecraft server
        uses: EduardoLobo23/plugin-deploy-action@v1
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          username: ${{ secrets.SFTP_USER }}
          # Prefer a key for automation; swap for `password:` if that's all you have.
          private-key: ${{ secrets.SFTP_PRIVATE_KEY }}
          local-path: build/libs/*.jar
          clean-pattern: MyPlugin-*.jar
          known-hosts: ${{ secrets.SFTP_KNOWN_HOSTS }}
